version: '3.8'

services:
  bus-display:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"  # Web interface
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - TZ=Europe/Vienna
